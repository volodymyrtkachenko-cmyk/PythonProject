{% extends 'layout/shop_layout.html' %}

{% block content %}

<div class="mb-4">
    <h4 class="text-white fw-semibold mb-1">Товари</h4>
    <p class="text-secondary small mb-0">{{ products.count }} товарів</p>
</div>

<div class="row g-3">
    {% for product in products %}
    <div class="col-6 col-md-4 col-lg-3">
        <a href= "{% url 'product_view' slug=product.slug %}" class="text-decoration-none">
        <div class="product-card rounded-3 overflow-hidden h-100"
             style="background-color: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); transition: all 0.2s;">

            <div style="aspect-ratio: 1/1; overflow: hidden; background-color: rgba(255,255,255,0.03);">
                {% if product.thumbnail %}
                <img src="{{ product.thumbnail.url }}" alt="{{ product.title }}"
                     class="w-100 h-100" style="object-fit: cover;">
                {% elif product.image %}
                <img src="{{ product.image.url }}" alt="{{ product.title }}"
                     class="w-100 h-100" style="object-fit: cover;">
                {% endif %}
            </div>

            <div class="p-3">
                <p class="text-white mb-1 fw-medium small">{{ product.title }}</p>
                <p class="text-secondary mb-0 small">{{ product.price }} ₴</p>
            </div>

        </div>
        </a>
    </div>
    {% empty %}
    <div class="col-12">
        <p class="text-secondary">Товарів ще немає</p>
    </div>
    {% endfor %}
</div>

<style>
    .product-card:hover {
        background-color: rgba(255, 255, 255, 0.08) !important;
        border-color: rgba(255, 255, 255, 0.2) !important;
        transform: translateY(-2px);
    }
</style>

{% endblock %}
