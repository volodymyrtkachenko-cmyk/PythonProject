{% extends 'layout/mainlayout.html' %}
{% load crispy_forms_tags %}
{% block content %}

{% if messages %}
<div class="alert alert-success alert-dismissible fade show" role="alert">
    {% for message in messages %}
    <p class="mb-0">{{ message }}</p>
    {% endfor %}
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>
{% endif %}

<div class="container">
    <h1 class="mb-4">Uploads</h1>
</div>

<form method="POST" action="{% url 'uploads' %}" enctype="multipart/form-data">
    <div class="card border-0 shadow-sm" style="background:#161b27;">
        <div class="card-body p-4">
            <h4 class="card-title mb-4" style="color: white">Upload a photo</h4>
            <form method="POST" action="{% url 'uploads' %}" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form|crispy }}
                <div class="d-grid mt-3">
                    <input type="submit" class="btn btn-primary">
                </div>
            </form>
        </div>
    </div>
</form>
{% endblock %}
