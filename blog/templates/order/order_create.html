{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block main %}
<div class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-md-8">
            <h2 class="mb-4 text-light">📦 Checkout</h2>

            <div class="card shadow-sm bg-dark text-light border-secondary">
                <div class="card-body p-4">
                    <h4 class="card-title border-bottom border-secondary pb-3 mb-4">
                        Shipping Details
                    </h4>

                    <form method="POST" action="{% url 'order_view' %}">
                        {% csrf_token %}

                        {{ form|crispy }}

                        <div class="text-end mt-4">
                            <a href="{% url 'cart:cart_detail' %}" class="btn btn-outline-light me-2">
                                Back to Cart
                            </a>
                            <button type="submit" class="btn btn-success btn-lg px-5">
                                Place Order
                            </button>
                        </div>
                    </form>

                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
