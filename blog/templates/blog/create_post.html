{% extends 'layout/mainlayout.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container" style="padding-top: 80px; max-width: 700px;">

    {% if messages %}
    <div class="alert alert-success alert-dismissible fade show" role="alert">
        {% for message in messages %}
        <p class="mb-0">{{ message }}</p>
        {% endfor %}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    {% endif %}

    <div class="card border-0 shadow-sm" style="background:#161b27;">
        <div class="card-body p-4 p-sm-5">

            <h4 class="fw-bold text-white mb-4">Створити пост</h4>

            <form method="POST" action="{% url 'create_post' %}">
                {% csrf_token %}
                {{ form|crispy }}
                <!-- BS3: btn-block btn-default → BS5: d-grid + btn-primary -->
                <div class="d-grid mt-3">
                    <input type="submit" class="btn btn-primary fw-semibold" value="Зберегти">
                </div>
            </form>

        </div>
    </div>

</div>

<script>
    // Виправлено баг: bootstrap.Model → bootstrap.Modal
    document.addEventListener('DOMContentLoaded', function () {
        {%
            if messages %
        }
        var alertEl = document.querySelector('.alert');
        if (alertEl) alertEl.scrollIntoView({behavior: 'smooth'});
        {%
            endif %
        }
    });
</script>

{% endblock %}
