{% extends 'layout/mainlayout.html' %}
{% load crispy_forms_tags %}

{% block content %}

<div class="modal-body" id="successModal">
    {% if messages %}
        {% for message in messages %}
            <p>{{ message }}</p>
        {% endfor %}

    {% endif %}
</div>
<form method="POST" action="{% url 'contact' %}">
    {% csrf_token %}
    {{ form|crispy }}
    <input type="submit" class="btn-block btn-default" value="save">
</form>
{% endblock %}
